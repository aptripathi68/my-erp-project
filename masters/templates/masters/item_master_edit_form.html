<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edit Item</title>
    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f8;
            color:#24313d;
        }
        .topbar{
            background:#5f839d;
            color:white;
            padding:20px 28px;
        }
        .topbar h1{
            margin:0;
            font-size:30px;
            color:#f0d76b;
        }
        .topbar p{
            margin:8px 0 0;
        }
        .container{
            max-width:900px;
            margin:30px auto;
            background:white;
            padding:24px;
            border-radius:10px;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
        }
        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;
        }
        .full{
            grid-column:1 / -1;
        }
        label{
            display:block;
            font-weight:600;
            margin-bottom:6px;
        }
        input, select, textarea{
            width:100%;
            padding:10px 12px;
            border:1px solid #cfd8df;
            border-radius:6px;
            font-size:15px;
            box-sizing:border-box;
        }
        .actions{
            margin-top:24px;
            display:flex;
            gap:12px;
        }
        .btn{
            display:inline-block;
            padding:10px 16px;
            border-radius:6px;
            text-decoration:none;
            border:none;
            cursor:pointer;
            font-weight:600;
        }
        .btn-primary{
            background:#5f839d;
            color:white;
        }
        .btn-light{
            background:white;
            color:#24313d;
            border:1px solid #cfd8df;
        }
        .msg{
            padding:10px 12px;
            border-radius:6px;
            margin-bottom:14px;
        }
        .msg.error{
            background:#fde8e8;
            color:#a11;
        }
        .msg.success{
            background:#e8f7e8;
            color:#176b17;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Kalpadeep Industries Private Limited</h1>
        <p>Edit Item Master</p>
    </div>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="msg {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="grid">
                <div>
                    <label>Item Master ID</label>
                    <input type="text" name="item_master_id" value="{{ item.item_master_id }}" required>
                </div>

                <div>
                    <label>Section Name</label>
                    <input type="text" name="section_name" value="{{ item.section_name }}" required>
                </div>

                <div class="full">
                    <label>Item Description</label>
                    <textarea name="item_description" rows="3" required>{{ item.item_description }}</textarea>
                </div>

                <div>
                    <label>Group2</label>
                    <select name="group2" required>
                        <option value="">Select Group2</option>
                        {% for g in group2_list %}
                            <option value="{{ g.id }}" {% if item.group2_id == g.id %}selected{% endif %}>{{ g.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label>Grade</label>
                    <select name="grade" required>
                        <option value="">Select Grade</option>
                        {% for g in grade_list %}
                            <option value="{{ g.id }}" {% if item.grade_id == g.id %}selected{% endif %}>{{ g.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label>Unit Weight</label>
                    <input type="number" step="0.001" name="unit_weight" value="{{ item.unit_weight }}" required>
                </div>

                <div>
                    <label>Unit Weight Basis</label>
                    <select name="unit_weight_basis" required>
                        <option value="">Select Basis</option>
                        {% for value, label in unit_weight_basis_choices %}
                            <option value="{{ value }}" {% if item.unit_weight_basis == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="full">
                    <label>
                        <input type="checkbox" name="is_active" {% if item.is_active %}checked{% endif %}>
                        Is Active
                    </label>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Save Changes</button>
                <a class="btn btn-light" href="/item-master/">Back to List</a>
            </div>
        </form>
    </div>
</body>
</html>
