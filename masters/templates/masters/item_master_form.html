{% extends "base.html" %}

{% block content %}

<div style="max-width:700px;margin:auto;padding:20px">

<h2 style="margin-bottom:20px">Add New Item</h2>

<form method="post">
{% csrf_token %}

<div style="margin-bottom:15px">
<label><b>Item Master ID</b></label><br>
<input type="text" name="item_master_id" style="width:100%;padding:8px" required>
</div>

<div style="margin-bottom:15px">
<label><b>Section Name</b></label><br>
<input type="text" name="section_name" style="width:100%;padding:8px" required>
</div>

<div style="margin-bottom:15px">
<label><b>Item Description</b></label><br>
<input type="text" name="item_description" style="width:100%;padding:8px" required>
</div>

<div style="margin-bottom:15px">
<label><b>Group</b></label><br>
<select name="group2" style="width:100%;padding:8px" required>
<option value="">Select Group</option>
{% for g in group2_list %}
<option value="{{ g.id }}">{{ g.name }}</option>
{% endfor %}
</select>
</div>

<div style="margin-bottom:15px">
<label><b>Grade</b></label><br>
<select name="grade" style="width:100%;padding:8px" required>
<option value="">Select Grade</option>
{% for g in grade_list %}
<option value="{{ g.id }}">{{ g.name }}</option>
{% endfor %}
</select>
</div>

<div style="margin-bottom:15px">
<label><b>Unit Weight</b></label><br>
<input type="number" step="0.001" name="unit_weight" style="width:100%;padding:8px" required>
</div>

<div style="margin-bottom:15px">
<label><b>Weight Basis</b></label><br>
<select name="unit_weight_basis" style="width:100%;padding:8px" required>
{% for value,label in unit_weight_basis_choices %}
<option value="{{ value }}">{{ label }}</option>
{% endfor %}
</select>
</div>

<div style="margin-bottom:20px">
<label>
<input type="checkbox" name="is_active" checked>
Active Item
</label>
</div>

<div>
<button type="submit" style="padding:10px 20px;font-size:14px">
Save Item
</button>

<a href="/item-master/" style="margin-left:20px">
Cancel
</a>
</div>

</form>

</div>

{% endblock %}
