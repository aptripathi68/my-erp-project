<!DOCTYPE html>
<html>
<head>
    <title>Add New Item</title>
</head>

<body style="font-family:Arial">

<h2>Add New Item</h2>

<form method="post">
{% csrf_token %}

<p><b>Item Master ID:</b> Will be generated automatically by system.</p>

<label>Section Name</label><br>
<input type="text" name="section_name" required><br><br>

<label>Item Description</label><br>
<input type="text" name="item_description" required><br><br>

<label>Group</label><br>
<select name="group2" required>
    <option value="">Select Group</option>
    {% for g in group2_list %}
    <option value="{{ g.id }}">{{ g.name }}</option>
    {% endfor %}
</select><br><br>

<label>Grade</label><br>
<select name="grade" required>
    <option value="">Select Grade</option>
    {% for g in grade_list %}
    <option value="{{ g.id }}">{{ g.name }}</option>
    {% endfor %}
</select><br><br>

<label>Unit Weight</label><br>
<input type="text" name="unit_weight" required><br><br>

<label>Weight Basis</label><br>
<select name="unit_weight_basis" required>
    <option value="">Select Weight Basis</option>
    {% for value,label in unit_weight_basis_choices %}
    <option value="{{ value }}">{{ label }}</option>
    {% endfor %}
</select><br><br>

<label>
<input type="checkbox" name="is_active" checked>
Active
</label>

<br><br>

<button type="submit">Save Item</button>
<a href="/item-master/" style="margin-left:15px;">Cancel</a>

</form>

</body>
</html>
