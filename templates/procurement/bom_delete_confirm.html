<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Delete BOM</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            margin:24px;
            background:#f7f9fb;
            color:#24313d;
        }
        .card{
            background:#fff;
            border:1px solid #d9e2ec;
            border-radius:10px;
            padding:20px;
            max-width:700px;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
        }
        .btn{
            display:inline-block;
            padding:10px 16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:600;
            text-decoration:none;
            margin-right:10px;
        }
        .btn-danger{ background:#b00020; color:#fff; }
        .btn-secondary{ background:#fff; color:#24313d; border:1px solid #cfd8df; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Delete BOM</h2>
        <p><strong>BOM Name:</strong> {{ header.bom_name }}</p>
        <p><strong>Project:</strong> {{ header.project_name }}</p>
        <p><strong>Client:</strong> {{ header.client_name }}</p>
        <p style="color:#b00020;">
            This will delete the BOM header, all engineering marks, and all BOM components linked to it.
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
            <a href="{% url 'procurement:bom_upload' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
