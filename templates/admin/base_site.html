{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
.skip-to-content-link {
    display: none !important;
}

.theme-toggle,
[class*="theme-toggle"] {
    display: none !important;
}

#header {
    background: #5f839d;
    color: #fff;
}

/* Branding layout */
#branding {
    float: none;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 0;
}

/* Logo style */
#branding img {
    height: 90px;
    width: auto;
    background: #fff;
    padding: 6px;
    border-radius: 4px;
}

/* Company name */
#branding h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 600;
    color: #f0d76b;
}

/* User tools */
#user-tools {
    float: none;
    text-align: center;
    font-size: 16px;
    padding-bottom: 10px;
}

#user-tools,
#user-tools a {
    color: #fff;
}
</style>
{% endblock %}


{% block branding %}
<h1 id="site-name">
    <img src="{% static 'logo/kalpadeep_logo.jpg' %}" alt="Kalpadeep Logo">
    Kalpadeep Industries Private Limited
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}
