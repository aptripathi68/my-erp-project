{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
.skip-to-content-link {
    display: none !important;
}

.theme-toggle,
[class*="theme-toggle"] {
    display: none !important;
}

#header {
    background: #5f839d;
    color: #fff;
}

#branding {
    float: none;
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 16px 0;
}

#branding img {
    height: 90px;
    width: auto;
    background: #fff;
    padding: 6px;
}

#branding h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 600;
    color: #f0d76b;
}

#user-tools {
    float: none;
    text-align: center;
    font-size: 16px;
    padding-bottom: 10px;
}

#user-tools,
#user-tools a {
    color: #fff;
}
</style>
{% endblock %}

{% block branding %}
<img src="{% static 'logo/kalpadeep_logo.jpg' %}" alt="Kalpadeep Logo">
<h1 id="site-name">Kalpadeep Industries Private Limited</h1>
{% endblock %}

{% block nav-global %}{% endblock %}
